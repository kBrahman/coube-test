<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coube - Admin Panel</title>
    <!-- Basic styling based on your app's modern aesthetics -->
    <style>
        :root {
            --primary-col: #4A90E2;
            --bg-col: #f4f7f6;
            --card-bg: #ffffff;
            --text-col: #333333;
            --border-rad: 12px;
        }

        body {
            font-family: 'Inter', Roboto, sans-serif;
            background-color: var(--bg-col);
            color: var(--text-col);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .admin-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-rad);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }

        h1 { margin-top: 0; color: var(--primary-col); text-align: center; }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-col);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-col);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #357ABD;
        }
        
        button:active {
            transform: scale(0.98);
        }

        .status { margin-top: 20px; text-align: center; font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1>Tariff Settings</h1>

        <form id="tariffForm">
            <div class="form-group">
                <label for="baseRateModifier">Base Rate Modifier (e.g. 8)</label>
                <input type="number" id="baseRateModifier" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label for="urgent">Urgent Surcharge % (e.g. 0.20 for 20%)</label>
                <input type="number" id="urgent" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="fragile">Fragile Surcharge % (e.g. 0.10 for 10%)</label>
                <input type="number" id="fragile" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="oversized">Oversized Surcharge % (e.g. 0.25 for 25%)</label>
                <input type="number" id="oversized" step="0.01" required>
            </div>

            <button type="submit">Update Tariffs</button>
        </form>

        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            // Load initial data
            try {
                const response = await fetch('/api/admin/tariff');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('baseRateModifier').value = data.baseRateModifier;
                    document.getElementById('urgent').value = data.urgentSurchargePercentage;
                    document.getElementById('fragile').value = data.fragileSurchargePercentage;
                    document.getElementById('oversized').value = data.oversizedSurchargePercentage;
                }
            } catch (err) {
                console.error("Failed to load tariffs", err);
            }
        });

        document.getElementById('tariffForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusDiv = document.getElementById('statusMessage');
            
            const payload = {
                baseRateModifier: parseFloat(document.getElementById('baseRateModifier').value),
                urgentSurchargePercentage: parseFloat(document.getElementById('urgent').value),
                fragileSurchargePercentage: parseFloat(document.getElementById('fragile').value),
                oversizedSurchargePercentage: parseFloat(document.getElementById('oversized').value)
            };

            try {
                const res = await fetch('/api/admin/tariff', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    statusDiv.textContent = "Tariffs updated successfully!";
                    statusDiv.className = "status success";
                } else {
                    statusDiv.textContent = "Failed to update tariffs.";
                    statusDiv.className = "status error";
                }
            } catch (error) {
                statusDiv.textContent = "Error occurred connecting to server.";
                statusDiv.className = "status error";
            }
            
            // Clear message after 3 seconds
            setTimeout(() => { statusDiv.textContent = ""; }, 3000);
        });
    </script>
</body>
</html>
