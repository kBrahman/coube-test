<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Calculator | Coube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Decorative background elements */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(168, 85, 247, 0.2) 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-dim);
            transition: color 0.3s;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input[type="number"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            appearance: textfield;
            -moz-appearance: textfield;
        }

        .input-wrapper input::-webkit-outer-spin-button,
        .input-wrapper input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .input-wrapper .unit {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 0.85rem;
            pointer-events: none;
        }

        .checkbox-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .checkbox-group:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .checkbox-group input {
            display: none;
        }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--glass-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .checkbox-group input:checked + .custom-checkbox {
            background: var(--primary);
            border-color: var(--primary);
        }

        .custom-checkbox::after {
            content: "✓";
            color: white;
            font-size: 12px;
            display: none;
        }

        .checkbox-group input:checked + .custom-checkbox::after {
            display: block;
        }

        .checkbox-label {
            font-size: 0.9rem;
            font-weight: 500;
            user-select: none;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(to right, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Tooltip style icons */
        .icon {
            margin-right: 8px;
            opacity: 0.7;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="blob"></div>
    
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Delivery Quote</h1>
                <p>Enter shipment details below</p>
            </div>

            <div id="errorBox" class="error-pill" style="display: none; margin-bottom: 1.5rem; padding: 0.75rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 12px; color: #fca5a5; font-size: 0.85rem; text-align: center; font-weight: 500;">
                <span></span>
            </div>
            
            <form id="calcForm">
                <div class="form-group">
                    <label for="distance">DISTANCE</label>
                    <div class="input-wrapper">
                        <input type="number" id="distance" name="distance" placeholder="0.0" step="0.1" min="1" max="5000"
                               onkeypress="return (event.charCode >= 48 && event.charCode <= 57) || event.charCode == 46"
                               oninput="if(this.value < 0) this.value = Math.abs(this.value)" required>
                        <span class="unit">KM</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="weight">WEIGHT</label>
                    <div class="input-wrapper">
                        <input type="number" id="weight" name="weight" placeholder="0.0" step="0.1" min="0.1" max="120"
                               onkeypress="return (event.charCode >= 48 && event.charCode <= 57) || event.charCode == 46"
                               oninput="if(this.value < 0) this.value = Math.abs(this.value)" required>
                        <span class="unit">TONS</span>
                    </div>
                </div>

                <div class="checkbox-container">
                    <label class="checkbox-group">
                        <input type="checkbox" id="fragile" name="fragile">
                        <div class="custom-checkbox"></div>
                        <span class="checkbox-label">Fragile</span>
                    </label>

                    <label class="checkbox-group">
                        <input type="checkbox" id="urgent" name="urgent">
                        <div class="custom-checkbox"></div>
                        <span class="checkbox-label">Urgent</span>
                    </label>
                </div>

                <button type="submit" class="btn-submit">Calculate Price</button>
            </form>

            <div id="resultBox" class="result-box" style="display: none; margin-top: 2rem; padding: 1.5rem; background: rgba(99, 102, 241, 0.1); border: 1px dashed var(--primary); border-radius: 12px; text-align: center; animation: slideUp 0.5s ease-out;">
                <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 0.5rem;">Estimated Cost</p>
                <h2 style="font-size: 2.5rem; color: var(--text-main); font-weight: 700;"><span id="priceValue">0.00</span> <span id="currencyValue" style="font-size: 1.5rem; opacity: 0.8;">KZT</span></h2>
            </div>
        </div>
    </div>

    <script>
        // Subtle interactivity: follow mouse for light effect
        document.addEventListener('mousemove', (e) => {
            const blob = document.querySelector('.blob');
            const x = e.clientX;
            const y = e.clientY;
            
            blob.animate({
                left: `${x}px`,
                top: `${y}px`
            }, { duration: 3000, fill: "forwards" });
        });

        // Handle API submission
        document.getElementById('calcForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const distance = parseFloat(document.getElementById('distance').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const isFragile = document.getElementById('fragile').checked;
            const isUrgent = document.getElementById('urgent').checked;
            
            const payload = {
                distanceKm: distance,
                weightTon: weight,
                cargoType: isFragile ? 'FRAGILE' : 'STANDARD',
                isUrgent: isUrgent
            };

            const errorBox = document.getElementById('errorBox');
            const resultBox = document.getElementById('resultBox');
            
            try {
                const response = await fetch('/api/delivery/calculate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('priceValue').innerText = new Intl.NumberFormat('ru-RU').format(data.totalPrice);
                    document.getElementById('currencyValue').innerText = data.currency;
                    
                    errorBox.style.display = 'none';
                    resultBox.style.display = 'block';
                } else {
                    errorBox.querySelector('span').innerText = 'Failed to calculate quote. Validation error?';
                    errorBox.style.display = 'block';
                    resultBox.style.display = 'none';
                }
            } catch (err) {
                errorBox.querySelector('span').innerText = 'Network error. Could not connect to API.';
                errorBox.style.display = 'block';
                resultBox.style.display = 'none';
            }
        });
    </script>
</body>
</html>
